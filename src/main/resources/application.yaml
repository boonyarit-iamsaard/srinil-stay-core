spring:
  application:
    name: srinil-stay-core
  config:
    import: optional:file:.env[.properties]
  lifecycle:
    timeout-per-shutdown-phase: 30s

  mvc:
    problemdetails:
      enabled: true

  web:
    error:
      include-message: never
      include-binding-errors: never
      include-stacktrace: never
      include-exception: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": false
        jdbc:
          "[time_zone]": UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    access:
      max-permitted: read-only
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      validate-group-membership: false
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    "[me.boonyarit.srinil]": INFO

app:
  auth:
    jwt:
      secret: ${APP_AUTH_JWT_SECRET}
      access-token-ttl: ${APP_AUTH_JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token:
      hash-secret: ${APP_AUTH_REFRESH_TOKEN_HASH_SECRET}
      ttl: ${APP_AUTH_REFRESH_TOKEN_TTL:P30D}
      cookie-name: ${APP_AUTH_REFRESH_COOKIE_NAME:srinil_refresh_token}
      cookie-path: ${APP_AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
      cookie-secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:true}
      cookie-same-site: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
      random-bytes: ${APP_AUTH_REFRESH_TOKEN_RANDOM_BYTES:32}
    password:
      bcrypt-strength: ${APP_AUTH_BCRYPT_STRENGTH:12}
    cors:
      allowed-origins: ${APP_AUTH_CORS_ALLOWED_ORIGINS:}
