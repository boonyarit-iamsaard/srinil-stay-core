spring:
  application:
    name: srinil-stay-core

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mvc:
    problemdetails:
      enabled: true

  web:
    error:
      include-message: never
      include-binding-errors: never
      include-stacktrace: never
      include-exception: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": false
        jdbc:
          "[time_zone]": UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    access:
      max-permitted: read-only
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      validate-group-membership: false
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    "[me.boonyarit.srinil]": INFO
