name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Maven format check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check formatting
        run: ./mvnw -B spotless:check

  test:
    name: Maven test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: format
    env:
      SPRING_PROFILES_ACTIVE: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Copy environment variables
        run: cp .env.example .env

      - name: Run tests
        run: ./mvnw -B test

  build:
    name: Maven package and Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Copy environment variables
        run: cp .env.example .env

      - name: Package application
        run: ./mvnw -B package -DskipTests

      - name: Build Docker image
        run: docker build --tag srinil-stay-core:${{ github.sha }} .
